<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Kristine Servia" />
    <meta
      name="keywords"
      content="study-aids, flashcards, learning materials, index-cards"
    />
    <meta
      name="description"
      content="The Flashcard Project is an interactive application where users can create a custom flashcard collection."
    />
    <link href="./assets/vendor/normalize.css" rel="stylesheet" />
    <link href="./assets/css/style.css" rel="stylesheet" />
    <link href="./favicon.ico" rel="icon" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Carousel - Flash Cards</title>
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="/" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="/" class="nav__link">My Decks</a></li>
          <li><a href="" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content page__main-content_type_carousel">
      <section class="carousel">
        <h2 class="carousel__title">HTML & CSS &middot; Question 1 of 10</h2>

        <div class="carousel__row">
          <button
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            type="button"
            aria-label="Go to previous card in deck"
          ></button>

          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>

          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="Go to next card in deck"
          ></button>
        </div>

        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="Flip card to access content"
        ></button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">&copy; 2026 Kristine Servia</p>
    </footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Kristine Servia" />
    <meta
      name="keywords"
      content="study-aids, flashcards, learning materials, index-cards"
    />
    <meta
      name="description"
      content="The Flashcard Project is an interactive application where users can create a custom flashcard collection."
    />

    <link href="./assets/css/index.css" rel="stylesheet" />
    <link href="./favicon.ico" rel="icon" type="image/x-icon" />
    <title>Flash Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page">
    <!-- HEADER BLOCK -->
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>

      <!-- NAV BLOCK -->
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="#home" class="nav__link">My Decks</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <!-- GALLERY BLOCK  id="home"-->
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <div class="gallery__list-button-wrapper">
          <ul class="gallery__list">
            <!-- Flash Cards dynamically injected here inside the DOM -->
            <!-- New Flash Card Button -->
            <li class="gallery__new-card">
              <button
                class="gallery__new-card-btn"
                aria-label="Create new card"
                type="button"
              >
                + New Deck
              </button>
            </li>
          </ul>
        </div>
      </section>

      <!-- GALLERY BLOCK  id="deck-view"-->
      <section id="deck-view" class="gallery">
        <div class="gallery__practice-btn-wrapper">
          <h2 class="gallery__title"></h2>
          <button
            class="gallery__practice-btn"
            aria-label="Practice button"
            type="button"
          >
            Practice
          </button>
        </div>

        <div class="gallery__list-button-wrapper">
          <ul class="gallery__list">
            <!-- Flash Cards dynamically injected here inside the DOM -->
            <!-- New Flash Card Button -->
            <li class="gallery__new-card">
              <button
                class="gallery__new-card-btn"
                aria-label="Create new card"
                type="button"
              >
                + New Card
              </button>
            </li>
          </ul>
        </div>
      </section>

      <!--CAROUSEL BLOCK-->
      <section id="carousel" class="carousel">
        <h2 class="carousel__title">Carousel</h2>

        <div class="carousel__row">
          <button
            type="button"
            aria-label="Go to previous card in deck"
            class="carousel__btn carousel__btn_type_left"
          ></button>

          <div class="carousel__card">
            <h3 class="carousel__card-title"></h3>
            <p class="carousel__card-text"></p>
          </div>

          <button
            type="button"
            aria-label="Go to next card in deck"
            class="carousel__btn carousel__btn_type_right"
          ></button>
        </div>

        <button
          type="button"
          aria-label="Flip card to see contents"
          class="carousel__btn carousel__btn_type_flip"
        ></button>
      </section>

      <!-- NOT FOUND BLOCK   -->
      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
    </main>

    <!-- DECK TEMPLATE SECTION -->
    <template id="deck-template" class="card__list-template">
      <li class="card">
        <a href="#" class="card__link"></a>
        <h3 class="card__title"></h3>
        <div class="card__row">
          <p class="card__count"></p>
          <button
            class="card__delete-btn"
            aria-label="Delete deck"
            type="button"
          >
            <img src="./assets/images/delete.svg" alt="Delete deck" />
          </button>
        </div>
      </li>
    </template>

    <!-- CARD TEMPLATE SECTION -->
    <template id="card-template" class="card__list-template">
      <li class="card">
        <h3 class="card__title"></h3>
        <div class="card__row">
          <button
            class="card__flip-btn"
            aria-label="Flip card button"
            type="button"
          ></button>
          <button
            class="card__delete-btn"
            aria-label="Delete deck"
            type="button"
          >
            <img src="./assets/images/delete.svg" alt="Delete deck" />
          </button>
        </div>
      </li>
    </template>

    <!-- FOOTER BLOCK -->
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Kristine Servia</p>
    </footer>

    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
